name: Earthquake Emergency Monitor

on:
  schedule:
    # 5分ごとに実行（GitHub Actions の最小間隔）
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      client_id:
        description: "対象クライアントID"
        required: false
        default: "asahikawa-gas"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          REQ="$(find . -maxdepth 4 -name requirements.txt | head -n 1)"
          if [ -z "$REQ" ]; then echo "requirements.txt not found"; exit 1; fi
          pip install -r "$REQ"

      - name: Run earthquake monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLIENT_ID: ${{ github.event.inputs.client_id || 'asahikawa-gas' }}
        run: |
          MON="$(find . -maxdepth 4 -name earthquake_monitor.py | head -n 1)"
          if [ -z "$MON" ]; then echo "earthquake_monitor.py not found"; exit 1; fi
          python "$MON"
