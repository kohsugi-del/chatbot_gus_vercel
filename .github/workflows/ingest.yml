name: Daily RAG Ingest（旭川ガス）

on:
  schedule:
    # 毎日 3:00 JST（前日 18:00 UTC）
    - cron: "0 18 * * *"

  workflow_dispatch:
    inputs:
      max_pages:
        description: "最大クロールページ数"
        required: false
        default: "200"
      batch_size:
        description: "バッチサイズ"
        required: false
        default: "10"
      dry_run:
        description: "dry-run（DB書き込みをスキップ）"
        required: false
        default: "false"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: サイト接続確認
        run: |
          echo "=== 接続テスト ==="
          curl -s -o /dev/null -w "HTTP %{http_code} / 応答時間: %{time_total}s\n" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://asahikawa-gas.co.jp/ || echo "curl失敗"

      - name: Run HTML ingest（旭川ガス公式サイト）
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGEST_UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          HTTP_TIMEOUT: "60"
          HTTP_TIMEOUT_CONNECT: "15"
        run: |
          MAX_PAGES="${{ github.event.inputs.max_pages || '200' }}"
          BATCH_SIZE="${{ github.event.inputs.batch_size || '10' }}"

          python scripts/ingest.py \
            --sites-yml scripts/sites.yml \
            --max-pages "$MAX_PAGES" \
            --batch-size "$BATCH_SIZE"
